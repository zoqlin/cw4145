<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Meta Quest 3 MR Idol Support Stage</title>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <style>
    :root {
      --bg: rgba(4, 8, 10, 0.84);
      --panel: rgba(7, 12, 11, 0.9);
      --panel-soft: rgba(255, 255, 255, 0.06);
      --text: #f7fff2;
      --muted: rgba(240, 255, 236, 0.76);
      --accent: #e1e668;
      --accent-soft: #ffe9f5;
      --border: rgba(225, 230, 104, 0.24);
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(225, 230, 104, 0.22), transparent 34%),
        linear-gradient(180deg, #05090b 0%, #030405 100%);
    }

    #overlay {
      position: fixed;
      inset: 0;
      padding: 18px;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      pointer-events: none;
      z-index: 10;
    }

    .panel {
      width: min(470px, calc(100vw - 24px));
      padding: 20px;
      border-radius: 26px;
      background:
        linear-gradient(145deg, rgba(225, 230, 104, 0.18), rgba(8, 16, 15, 0.94) 26%, rgba(5, 10, 10, 0.96)),
        var(--panel);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      pointer-events: auto;
      transition: transform 160ms ease, width 160ms ease, padding 160ms ease;
    }

    body.is-xr .panel {
      width: min(360px, calc(100vw - 20px));
      padding: 16px;
    }

    .eyebrow {
      margin: 0 0 10px;
      font-size: 11px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--accent-soft);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(26px, 4vw, 34px);
      line-height: 1.08;
    }

    #status {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 16px;
      padding: 12px 14px;
      font: inherit;
      color: var(--text);
      cursor: pointer;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.04)),
        rgba(255, 255, 255, 0.03);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      transition: transform 120ms ease, background 120ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.08)),
        rgba(255, 255, 255, 0.05);
    }

    #startButton {
      grid-column: 1 / -1;
      font-weight: 700;
      color: #102008;
      background:
        linear-gradient(135deg, rgba(225, 230, 104, 0.96), rgba(255, 236, 246, 0.88));
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.28);
    }

    .tips {
      margin-bottom: 14px;
      padding: 14px;
      border-radius: 18px;
      background: var(--panel-soft);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .tips div + div {
      margin-top: 8px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    figure {
      margin: 0;
      padding: 10px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    figure img {
      display: block;
      width: 100%;
      margin-bottom: 8px;
      border-radius: 12px;
      object-fit: cover;
      aspect-ratio: 3 / 4;
    }

    figcaption {
      font-size: 12px;
      line-height: 1.45;
      color: var(--muted);
    }

    code {
      font-family: Consolas, "SFMono-Regular", monospace;
    }

    @media (max-width: 560px) {
      #overlay {
        padding: 12px;
      }

      .panel {
        width: calc(100vw - 16px);
        padding: 16px;
      }

      .controls,
      .cards {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="overlay">
    <div class="panel">
      <p class="eyebrow">A-Frame / WebXR / Quest 3</p>
      <h1>香槟绿 MR 应援舞台</h1>
      <p id="status">
        点击“开始体验”后，你前方会生成中央大屏与成员弧形阵列。靠近成员卡片会先出现锁定反馈，再自动播放对应音频；如果手势可用，也可以用右手直接捏合锁定。      </p>

      <div class="controls">
        <button id="startButton">开始体验</button>
        <button id="demoNextButton">桌面测试下一位</button>
        <button id="resetButton">重置场景</button>
      </div>

      <div class="tips">
        <div>推荐使用 Quest 3 的 Meta Browser，通过 <code>https://</code> 或 <code>localhost</code> 打开。</div>
        <div>当前版本先优先保证“中央大屏 + 空间音频 + 右手捏合锁定”稳定可用，再逐步叠加复杂识别。</div>
        <div>靠近成员卡片会先高亮并显示已瞄准，继续靠近会自动开始音频；同一时间只会播放一个成员音频，背景视频与 BGM 会自动降音量。</div>
      </div>

      <div class="cards">
        <figure>
          <img src="assets/photocard-kun.png" alt="KUN">
          <figcaption>KUN 卡片与语音</figcaption>
        </figure>
        <figure>
          <img src="assets/photocard-ten.png" alt="TEN">
          <figcaption>TEN 卡片与语音</figcaption>
        </figure>
        <figure>
          <img src="assets/photocard-xj.png" alt="XIAOJUN">
          <figcaption>XIAOJUN 卡片与语音</figcaption>
        </figure>
        <figure>
          <img src="assets/photocard-yangyang.png" alt="YANGYANG">
          <figcaption>YANGYANG 卡片与语音</figcaption>
        </figure>
        <figure>
          <img src="assets/photocard-hgh.png" alt="HENDERY">
          <figcaption>HENDERY 卡片与语音</figcaption>
        </figure>
      </div>
    </div>
  </div>

  <a-scene
    id="scene"
    embedded
    background="color: #040607"
    renderer="alpha: true; antialias: true; colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    xr-mode-ui="enabled: false"
    webxr="referenceSpaceType: local-floor; requiredFeatures: local-floor; optionalFeatures: hand-tracking, dom-overlay; overlayElement: #overlay"
    mr-idol-experience
  >
    <a-assets timeout="20000">
      <img id="grassTexture" src="assets/grass.jpg" crossorigin="anonymous">
      <img id="kunArt" src="assets/photocard-kun.png" crossorigin="anonymous">
      <img id="tenArt" src="assets/photocard-ten.png" crossorigin="anonymous">
      <img id="xjArt" src="assets/photocard-xj.png" crossorigin="anonymous">
      <img id="yangArt" src="assets/photocard-yangyang.png" crossorigin="anonymous">
      <img id="hghArt" src="assets/photocard-hgh.png" crossorigin="anonymous">
      <img id="kunDetailArt" src="assets/kun.png" crossorigin="anonymous">
      <img id="tenDetailArt" src="assets/ten.png" crossorigin="anonymous">
      <img id="xjDetailArt" src="assets/xj.png" crossorigin="anonymous">
      <img id="yangDetailArt" src="assets/yangyang.png" crossorigin="anonymous">
      <img id="hghDetailArt" src="assets/hgh.png" crossorigin="anonymous">
      <video id="teaserVideo" src="assets/teaser-video.mp4" preload="auto" crossorigin="anonymous" playsinline webkit-playsinline loop></video>
      <audio id="bgmTrack" src="assets/bgm.mp4" preload="auto" crossorigin="anonymous"></audio>
    </a-assets>

    <a-entity id="previewEnvironment">
      <a-sky color="#0b1516"></a-sky>
      <a-plane
        rotation="-90 0 0"
        width="32"
        height="32"
        material="src: #grassTexture; repeat: 10 10; roughness: 1; metalness: 0; side: double"
      ></a-plane>
      <a-ring
        position="0 0.02 0"
        rotation="-90 0 0"
        radius-inner="1.05"
        radius-outer="1.32"
        material="shader: flat; color: #e1e668; transparent: true; opacity: 0.16"
      ></a-ring>
      <a-text
        value="桌面预览模式\n点击开始体验"
        align="center"
        width="4.6"
        color="#ffe9f5"
        position="0 1.95 -2.3"
      ></a-text>
    </a-entity>

    <a-entity id="rig" position="0 0 2.6">
      <a-entity id="userCamera" camera="near: 0.01; far: 100" look-controls wasd-controls position="0 1.65 0"></a-entity>
    </a-entity>

    <a-entity
      id="leftHand"
      hand-tracking-controls="hand: left; modelStyle: mesh; modelColor: #ffc4db; modelOpacity: 0.6"
      pinch-input="hand: left"
    >
    </a-entity>

    <a-entity
      id="rightHand"
      hand-tracking-controls="hand: right; modelStyle: mesh; modelColor: #ffc4db; modelOpacity: 0.6"
      pinch-input="hand: right"
    >
      <a-entity class="wand" support-wand="hand: right; sourceHand: #rightHand"></a-entity>
    </a-entity>

    <a-entity id="experienceRoot" visible="false">
      <a-entity id="stageGlow" position="0 0.01 0">
        <a-ring
          rotation="-90 0 0"
          radius-inner="0.96"
          radius-outer="1.36"
          material="shader: flat; color: #e1e668; transparent: true; opacity: 0.14; side: double"
        ></a-ring>
      </a-entity>

      <a-entity id="screenRig" position="0 1.52 0">
        <a-plane
          width="2.56"
          height="1.54"
          material="shader: flat; color: #e1e668; transparent: true; opacity: 0.16; side: double"
        ></a-plane>
        <a-plane
          id="screenGlow"
          width="2.72"
          height="1.7"
          position="0 0 -0.02"
          material="shader: flat; color: #e1e668; transparent: true; opacity: 0.08; side: double"
        ></a-plane>
        <a-plane
          width="2.42"
          height="1.4"
          position="0 0 0.01"
          material="shader: flat; color: #091211; transparent: true; opacity: 0.92; side: double"
        ></a-plane>
        <a-video
          id="mainVideoScreen"
          width="2.24"
          height="1.26"
          position="0 0.03 0.02"
          src="#teaserVideo"
          material="shader: flat; side: double"
        ></a-video>
        <a-text
          value="WAYV CYBER ALTAR"
          align="center"
          width="4.1"
          color="#ffe9f5"
          position="0 -0.86 0.03"
        ></a-text>
        <a-text
          id="focusLabel"
          value="靠近任意成员卡片开始体验"
          visible="true"
          align="center"
          width="2.5"
          color="#ffe9f5"
          position="0 -1.06 0.03"
        ></a-text>
      </a-entity>

      <a-entity id="memberArc"></a-entity>
      <a-entity id="selectionBillboard" visible="false">
        <a-plane
          id="selectionPhotoGlow"
          width="0.62"
          height="0.82"
          position="0 0 -0.02"
          material="shader: flat; color: #e1e668; transparent: true; opacity: 0.14; side: double"
        ></a-plane>
        <a-plane
          id="selectionPhotoBacking"
          width="0.56"
          height="0.76"
          material="shader: flat; color: #071211; transparent: true; opacity: 0.92; side: double"
        ></a-plane>
        <a-ring
          id="selectionPhotoRing"
          radius-inner="0.28"
          radius-outer="0.315"
          position="0 0.03 -0.004"
          material="shader: flat; color: #e1e668; transparent: true; opacity: 0.28; side: double"
        ></a-ring>
        <a-ring
          id="selectionPhotoRingOuter"
          radius-inner="0.35"
          radius-outer="0.366"
          position="0 0.03 -0.01"
          material="shader: flat; color: #ffe9f5; transparent: true; opacity: 0.12; side: double"
        ></a-ring>
        <a-image
          id="selectionPhoto"
          width="0.48"
          height="0.64"
          position="0 0.02 0.02"
          material="shader: flat; side: double; transparent: true"
        ></a-image>
        <a-text
          id="selectionCaption"
          value=""
          align="center"
          width="1.6"
          color="#ffe9f5"
          position="0 -0.46 0.02"
        ></a-text>
      </a-entity>
      <a-entity id="selectionGroundCue" visible="false">
        <a-ring
          id="selectionGroundRing"
          rotation="-90 0 0"
          radius-inner="0.16"
          radius-outer="0.22"
          material="shader: flat; color: #e1e668; transparent: true; opacity: 0.4; side: double"
        ></a-ring>
      </a-entity>
      <a-entity id="selectionBeam" visible="false">
        <a-cone
          id="selectionBeamCone"
          radius-bottom="0.28"
          radius-top="0.02"
          height="2.2"
          material="shader: flat; color: #e1e668; transparent: true; opacity: 0.1; side: double"
        ></a-cone>
      </a-entity>
    </a-entity>

    <a-entity id="laserLine" visible="false"></a-entity>

    <a-light type="ambient" intensity="0.7" color="#ffffff"></a-light>
    <a-light type="directional" intensity="0.95" color="#fffad8" position="1.2 3 1.6"></a-light>
    <a-light type="point" intensity="0.5" color="#e1e668" position="0 2 -1.2" distance="6"></a-light>
  </a-scene>

  <script>
    (() => {
      const APP_CONFIG = {
        colors: {
          accent: "#e1e668",
          accentSoft: "#ffe9f5",
          panel: "#091211",
          line: "#e1e668",
          inactive: "#f7fbf2"
        },
        video: {
          baseVolume: 0,
          duckedVolume: 0,
          muted: true
        },
        bgm: {
          baseVolume: 0.22,
          duckedVolume: 0.06
        },
        voices: {
          previewVolume: 0.7,
          selectedVolume: 1
        },
        interaction: {
          handHoverDistance: 0.48,
          focusDistance: 2.15,
          autoSelectDistance: 1.72,
          autoSelectHoldMs: 220,
          releaseDistance: 2.32,
          replayCooldownMs: 1100
        },
        layout: {
          memberArcDegrees: 68,
          memberArcRadiusX: 1.5,
          memberArcDepth: 0.6,
          memberBaseY: 0.72,
          cardImageHeight: 0.54,
          cardPaddingX: 0.08,
          cardPaddingY: 0.09,
          topPhotoHeight: 0.7
        },
        stage: {
          distance: 2.05,
          screenHeight: 1.52
        },
        members: [
          {
            key: "kun",
            name: "KUN",
            color: "#f2f59f",
            imageId: "kunArt",
            detailImageId: "kunDetailArt",
            audioSrc: "assets/voice-kun.mp3"
          },
          {
            key: "ten",
            name: "TEN",
            color: "#ffd2ef",
            imageId: "tenArt",
            detailImageId: "tenDetailArt",
            audioSrc: "assets/voice-ten.mp4"
          },
          {
            key: "xj",
            name: "XIAOJUN",
            color: "#c6f0a5",
            imageId: "xjArt",
            detailImageId: "xjDetailArt",
            audioSrc: "assets/voice-xj.mp3"
          },
          {
            key: "yangyang",
            name: "YANGYANG",
            color: "#b8efff",
            imageId: "yangArt",
            detailImageId: "yangDetailArt",
            audioSrc: "assets/yang.mp4"
          },
          {
            key: "hgh",
            name: "HENDERY",
            color: "#ffd8a8",
            imageId: "hghArt",
            detailImageId: "hghDetailArt",
            audioSrc: "assets/voice-hgh.mp4"
          }
        ]
      };

      AFRAME.registerSystem("trail-pool", {
        init() {
          this.cursor = 0;
          this.items = [];
          const geometry = new THREE.IcosahedronGeometry(1, 0);

          for (let i = 0; i < 96; i += 1) {
            const material = new THREE.MeshBasicMaterial({
              color: APP_CONFIG.colors.accent,
              transparent: true,
              opacity: 0,
              blending: THREE.AdditiveBlending,
              depthWrite: false
            });

            const mesh = new THREE.Mesh(geometry, material);
            mesh.visible = false;
            mesh.renderOrder = 10;
            this.el.object3D.add(mesh);

            this.items.push({
              mesh,
              material,
              velocity: new THREE.Vector3(),
              life: 0,
              maxLife: 0,
              baseScale: 0.02
            });
          }
        },

        spawn(position, motion, intensity, color) {
          const count = intensity > 0.75 ? 3 : intensity > 0.38 ? 2 : 1;

          for (let i = 0; i < count; i += 1) {
            const item = this.items[this.cursor % this.items.length];
            this.cursor += 1;

            const spread = 0.014 + intensity * 0.032;
            item.mesh.visible = true;
            item.mesh.position.copy(position);
            item.mesh.position.x += (Math.random() - 0.5) * spread;
            item.mesh.position.y += (Math.random() - 0.5) * spread;
            item.mesh.position.z += (Math.random() - 0.5) * spread;
            item.baseScale = 0.018 + intensity * 0.04 + Math.random() * 0.012;
            item.mesh.scale.setScalar(item.baseScale);
            item.material.color.copy(color);
            item.material.opacity = 0.58;

            item.velocity.copy(motion).multiplyScalar(-0.16);
            item.velocity.x += (Math.random() - 0.5) * 0.2;
            item.velocity.y += Math.random() * 0.18;
            item.velocity.z += (Math.random() - 0.5) * 0.2;
            item.life = 0.24 + intensity * 0.52 + Math.random() * 0.08;
            item.maxLife = item.life;
          }
        },

        tick(time, delta) {
          if (!delta) {
            return;
          }

          const dt = delta / 1000;
          for (const item of this.items) {
            if (!item.mesh.visible) {
              continue;
            }

            item.life -= dt;
            if (item.life <= 0) {
              item.mesh.visible = false;
              continue;
            }

            const life01 = item.life / item.maxLife;
            item.mesh.position.addScaledVector(item.velocity, dt);
            item.velocity.multiplyScalar(0.96);
            item.mesh.scale.setScalar(item.baseScale + (1 - life01) * 0.06);
            item.material.opacity = Math.pow(life01, 1.8) * 0.62;
          }
        }
      });

      AFRAME.registerComponent("pinch-input", {
        dependencies: ["hand-tracking-controls"],

        schema: {
          hand: { default: "left" }
        },

        init() {
          this.onPinchStarted = this.onPinchStarted.bind(this);
          this.onPinchMoved = this.onPinchMoved.bind(this);
          this.onPinchEnded = this.onPinchEnded.bind(this);
          this.el.addEventListener("pinchstarted", this.onPinchStarted);
          this.el.addEventListener("pinchmoved", this.onPinchMoved);
          this.el.addEventListener("pinchended", this.onPinchEnded);
        },

        onPinchStarted(event) {
          const experience = this.el.sceneEl.components["mr-idol-experience"];
          if (experience) {
            experience.handlePinchStart(this.data.hand, this.el, event && event.detail && event.detail.position);
          }
        },

        onPinchMoved(event) {
          const experience = this.el.sceneEl.components["mr-idol-experience"];
          if (experience) {
            experience.handlePinchMove(this.data.hand, event && event.detail && event.detail.position);
          }
        },

        onPinchEnded() {
          const experience = this.el.sceneEl.components["mr-idol-experience"];
          if (experience) {
            experience.handlePinchEnd(this.data.hand);
          }
        },

        remove() {
          this.el.removeEventListener("pinchstarted", this.onPinchStarted);
          this.el.removeEventListener("pinchmoved", this.onPinchMoved);
          this.el.removeEventListener("pinchended", this.onPinchEnded);
        }
      });

      AFRAME.registerComponent("support-wand", {
        schema: {
          hand: { default: "right" },
          sourceHand: { type: "selector" }
        },

        init() {
          this.sourceHandEl = this.data.sourceHand || this.el.parentEl;
          this.baseColor = new THREE.Color("#f7fbf2");
          this.activeColor = new THREE.Color(APP_CONFIG.colors.accent);
          this.mixColor = new THREE.Color(APP_CONFIG.colors.accent);
          this.white = new THREE.Color("#ffffff");
          this.trailColor = new THREE.Color(APP_CONFIG.colors.accent);
          this.tipWorld = new THREE.Vector3();
          this.lastTipWorld = new THREE.Vector3();
          this.motion = new THREE.Vector3();
          this.ready = false;
          this.speed = 0;
          this.energyTarget = 0;
          this.energyValue = 0;
          this.trailAccumulator = 0;
          this.overlayPrepared = false;

          const isLeft = this.data.hand === "left";
          this.el.object3D.position.set(isLeft ? -0.05 : 0.05, -0.03, -0.02);
          this.el.object3D.rotation.set(
            THREE.MathUtils.degToRad(14),
            0,
            THREE.MathUtils.degToRad(isLeft ? -18 : 18)
          );
          this.el.object3D.scale.setScalar(1.08);

          this.buildMesh();
        },

        buildMesh() {
          const root = this.el;

          const rod = document.createElement("a-cylinder");
          rod.setAttribute("class", "wand-body");
          rod.setAttribute("radius", "0.016");
          rod.setAttribute("height", "0.42");
          rod.setAttribute("position", "0 0.05 0");
          rod.setAttribute("material", "color: #fbfcfa; roughness: 0.22; metalness: 0.18; emissive: #dce68a; emissiveIntensity: 0.45");
          root.appendChild(rod);

          const grip = document.createElement("a-cylinder");
          grip.setAttribute("class", "wand-grip");
          grip.setAttribute("radius", "0.018");
          grip.setAttribute("height", "0.12");
          grip.setAttribute("position", "0 -0.02 0");
          grip.setAttribute("material", "color: #f6f8f3; roughness: 0.6; metalness: 0.06; emissive: #bfc77d; emissiveIntensity: 0.16");
          root.appendChild(grip);

          const cap = document.createElement("a-cylinder");
          cap.setAttribute("class", "wand-cap");
          cap.setAttribute("radius", "0.021");
          cap.setAttribute("height", "0.036");
          cap.setAttribute("position", "0 0.245 0");

        updateMeshes() {
          if (!this.bodyMesh && this.bodyEl) {
            this.bodyMesh = this.bodyEl.getObject3D("mesh");
          }

          if (!this.gripMesh && this.gripEl) {
            this.gripMesh = this.gripEl.getObject3D("mesh");
          }

          if (!this.armMeshes.length) {
            this.armMeshes = this.armEls.map((el) => el.getObject3D("mesh")).filter(Boolean);
          }

          if (!this.haloMeshes.length) {
            this.haloMeshes = this.haloEls.map((el) => el.getObject3D("mesh")).filter(Boolean);
          }

          if (!this.overlayPrepared) {
            const overlayMeshes = [
              this.bodyMesh,
              this.gripMesh,
              ...this.armMeshes,
              ...this.haloMeshes
            ].filter(Boolean);

            overlayMeshes.forEach((mesh, index) => {
              mesh.renderOrder = 200 + index;
              if (mesh.material) {
                mesh.material.transparent = true;
                mesh.material.depthTest = false;
                mesh.material.depthWrite = false;
                mesh.material.needsUpdate = true;
              }
            });

            this.overlayPrepared = overlayMeshes.length > 0;
          }
        },

        tick(time, delta) {
          const sourceVisible = !!(this.sourceHandEl && this.sourceHandEl.object3D.visible !== false);
          this.el.object3D.visible = sourceVisible;

          this.updateMeshes();
          if (!delta || !this.tipEl || !sourceVisible) {
            this.ready = false;
            return;
          }

          this.tipEl.object3D.getWorldPosition(this.tipWorld);

          if (!this.ready) {
            this.lastTipWorld.copy(this.tipWorld);
            this.ready = true;
            return;
          }

          const dt = delta / 1000;
          this.motion.subVectors(this.tipWorld, this.lastTipWorld);
          const instantSpeed = this.motion.length() / Math.max(dt, 0.0001);
          this.speed = THREE.MathUtils.lerp(this.speed, instantSpeed, 0.2);
          this.lastTipWorld.copy(this.tipWorld);

          this.energyValue = THREE.MathUtils.lerp(this.energyValue, this.energyTarget, 0.18);
          this.energyTarget *= 0.988;

          const motion01 = THREE.MathUtils.clamp(this.speed / 2.0, 0, 1);
          const combined = Math.min(1, Math.max(this.energyValue, motion01 * 0.8));
          const flashMix = Math.min(1, motion01 * 0.16 + this.energyValue * 0.86);
          this.mixColor.copy(this.baseColor).lerp(this.activeColor, flashMix);

          if (this.bodyMesh && this.bodyMesh.material.emissive) {
            this.bodyMesh.material.color.set("#fbfcfa");
            this.bodyMesh.material.emissive.copy(this.mixColor);
            this.bodyMesh.material.emissiveIntensity = 0.22 + combined * 1.15;
          }

          if (this.gripMesh && this.gripMesh.material.emissive) {
            this.gripMesh.material.emissive.copy(this.mixColor);
            this.gripMesh.material.emissiveIntensity = 0.08 + combined * 0.5;
          }

          for (const armMesh of this.armMeshes) {
            if (!armMesh.material.emissive) {
              continue;
            }

            armMesh.material.color.copy(this.mixColor).lerp(this.white, 0.12);
            armMesh.material.emissive.copy(this.mixColor);
            armMesh.material.emissiveIntensity = 2.0 + combined * 5.4;
          }

          for (let i = 0; i < this.haloMeshes.length; i += 1) {
            const haloMesh = this.haloMeshes[i];
            const haloEl = this.haloEls[i];
            if (!haloMesh || !haloEl) {
              continue;
            }

            haloMesh.material.color.copy(this.mixColor);
            haloMesh.material.opacity = 0.06 + combined * 0.26;
            haloEl.object3D.scale.setScalar(1 + combined * 0.62 + Math.sin(time * 0.012) * 0.04);
          }

          const light = this.lightEl ? this.lightEl.getObject3D("light") : null;
          if (light) {
            light.color.copy(this.mixColor);
            light.intensity = 0.9 + combined * 4.2;
            light.distance = 0.9 + combined * 1.4;
          }

          this.trailAccumulator += delta;
          const spawnInterval = combined > 0.72 ? 18 : 36;
          if (combined > 0.08 && this.trailAccumulator >= spawnInterval) {
            this.el.sceneEl.systems["trail-pool"].spawn(this.tipWorld, this.motion, combined, this.trailColor);
            this.trailAccumulator = 0;
          }
        }

            return;

          mediaEl.volume = from;
          const startedAt = performance.now();
          const step = () => {
            const t = THREE.MathUtils.clamp((performance.now() - startedAt) / duration, 0, 1);
            mediaEl.volume = THREE.MathUtils.lerp(from, to, t);
            if (t < 1) {
              requestAnimationFrame(step);
              return;
            }

            mediaEl.volume = to;
            if (done) {
              done();
            }
          };

          requestAnimationFrame(step);

                }
              } catch (error) {
              }
            }

            this.positionStageInFront();
            await this.startVideoLoop();
            await this.startBgmLoop();
            this.started = true;
            this.stageStartedAt = performance.now();
            this.stageRootEl.object3D.visible = true;
            this.previewEnvironmentEl.object3D.visible = !this.el.is("ar-mode");
            this.setStatus("舞台已生成。靠近成员卡片即可自动选中并播放音频，也可以捏合右手进行锁定。");
          } finally {
            this.preparing = false;
          }
        },

        positionStageInFront() {
          this.getCameraPose();
          this.cameraForwardFlat.copy(this.cameraDirection).setY(0);
          if (this.cameraForwardFlat.lengthSq() < 0.0001) {
            this.cameraForwardFlat.set(0, 0, -1);
          }
          this.cameraForwardFlat.normalize();

          this.tempWorld.copy(this.cameraPosition).add(this.cameraForwardFlat.clone().multiplyScalar(APP_CONFIG.stage.distance));
          this.tempWorld.y = 0;
          this.stageRootEl.object3D.position.copy(this.tempWorld);

          this.tempWorldB.copy(this.cameraPosition);
          this.tempWorldB.y = 0;
          this.stageRootEl.object3D.lookAt(this.tempWorldB);
          this.stageRootEl.object3D.rotation.x = 0;
          this.stageRootEl.object3D.rotation.z = 0;
        },

        async startVideoLoop() {
          this.videoEl.loop = true;
          this.videoEl.currentTime = 0;
          this.videoEl.muted = APP_CONFIG.video.muted;
          this.restoreVideo();
          const promise = this.videoEl.play();
          if (promise && promise.catch) {
            promise.catch(() => {});
          }
        },

        async startBgmLoop() {
          if (!this.bgmEl) {
            return;
          }

          this.bgmEl.loop = true;
          this.bgmEl.currentTime = 0;
          this.bgmEl.volume = 0;
          const promise = this.bgmEl.play();
          if (promise && promise.catch) {
            promise.catch(() => {});
          }
          this.fadeMediaVolume(this.bgmEl, 0, APP_CONFIG.bgm.baseVolume, 500);
        },

        attachAudioToMember(member) {
          if (!member) {
            return;
          }

          if (this.spatialSound.parent !== member.el.object3D) {
            member.el.object3D.add(this.spatialSound);
          }
          this.spatialSound.position.set(0, 0.06, 0.04);
        },

        playMemberAudio(member, mode) {
          if (!member) {
            return;
          }

          this.stopMemberAudio(false);
          this.attachAudioToMember(member);

          if (this.audioEl.src !== new URL(member.audioSrc, window.location.href).href) {
            this.audioEl.src = member.audioSrc;
            this.audioEl.load();
          } else {
            this.audioEl.currentTime = 0;
          }

          this.previewTarget = mode === "preview" ? member : null;
          this.activeSelection = mode === "selected" ? member : null;
          this.candidateTarget = member;
          this.candidateSince = performance.now();
          this.audioEl.loop = false;
          this.audioEl.volume = 0;
          this.audioEl.currentTime = 0;
          this.duckVideo();
          if (mode === "selected") {
            this.duckBgm();
          } else {
            this.setBgmVolume(0.12);
          }
          this.updateFocusHud(member, mode);

          if (this.spatialSound && this.spatialSound.context && this.spatialSound.context.resume) {
            this.spatialSound.context.resume().catch(() => {});
          }

          const promise = this.audioEl.play();
          if (promise && promise.catch) {
            promise.catch(() => {
              this.setStatus(`${member.name} 已被选中，但浏览器暂时拦截了音频。请再次点击“开始体验”后重试。`);
            });
          }
          this.fadeMediaVolume(
            this.audioEl,
            0,
            mode === "selected" ? APP_CONFIG.voices.selectedVolume : APP_CONFIG.voices.previewVolume,
            320
          );

          this.updateWandsForState();

          if (mode === "preview") {
            this.setStatus(`${member.name} 已瞄准。继续靠近或直接捏合，即可开始播放该成员音频。`);
          } else {
            this.setStatus(`${member.name} 已锁定。当前只播放这一位成员的音频，中央视频与 BGM 音量已自动降低。`);
          }
        },

        stopMemberAudio(clearSelection = true) {
          this.audioEl.pause();
          this.audioEl.currentTime = 0;
          this.previewTarget = null;
          if (clearSelection) {
            this.activeSelection = null;
            this.candidateTarget = null;
            this.candidateSince = 0;
            this.activeHand = null;
            this.activeHandEl = null;
          }

          if (!this.activeSelection) {
            this.restoreVideo();
            this.restoreBgm();
          }

          this.updateFocusHud(this.activeSelection || this.candidateTarget, this.activeSelection ? "selected" : "preview");
          this.updateWandsForState();
        },

        fadeOutAudioAndClear() {
          if (this.audioEl.paused && !this.activeSelection) {
            this.restoreVideo();
            return;
          }

          const startVolume = this.audioEl.volume;
          const startedAt = performance.now();
          const duration = 260;

          const step = () => {
            const elapsed = performance.now() - startedAt;
            const t = THREE.MathUtils.clamp(elapsed / duration, 0, 1);
            this.audioEl.volume = THREE.MathUtils.lerp(startVolume, 0, t);
            if (t < 1 && this.activeSelection) {
              requestAnimationFrame(step);
              return;
            }

            this.audioEl.volume = 1;
            this.stopMemberAudio(true);
            this.hideLaser();
            this.restoreBgm();
            this.setStatus("连线已解除，应援棒回到呼吸灯待机状态。");
          };

          requestAnimationFrame(step);
        },

        updateWandsForState() {
          const color = this.activeSelection
            ? this.activeSelection.color
            : this.previewTarget
              ? this.previewTarget.color
              : this.candidateTarget
                ? this.candidateTarget.color
              : APP_CONFIG.colors.accent;

          const energy = this.activeSelection
            ? 1
            : this.previewTarget
              ? 0.34
              : this.candidateTarget
                ? 0.2
              : 0.12;

          document.querySelectorAll(".wand").forEach((el) => {
            const component = el.components["support-wand"];
            if (!component) {
              return;
            }
            component.setActiveColor(color);
            component.setEnergy(energy);
          });
        },

        findBestTargetForHand(hand) {
          const hoveredKey = this.hoveredByHand[hand];
          if (hoveredKey && this.memberMap.has(hoveredKey)) {
            return this.memberMap.get(hoveredKey);
          }

          const handPos = this.handWorld[hand];
          let best = null;
          let bestDistance = Infinity;

          for (const member of this.members) {
            member.el.object3D.getWorldPosition(this.tempWorld);
            const distance = handPos.distanceTo(this.tempWorld);
            if (distance < 0.45 && distance < bestDistance) {
              best = member;
              bestDistance = distance;
            }
          }

          return best;
        },

        handlePinchStart(hand, handEl, pinchPosition) {
          if (!this.started) {
            return;
          }

          this.pinchingHands[hand] = true;
          if (pinchPosition) {
            this.handWorld[hand].copy(pinchPosition);
          } else {
            this.getHandWorldPosition(hand, this.handWorld[hand]);
          }

          const target = this.findBestTargetForHand(hand) || this.previewTarget;
          if (!target) {
            this.setStatus("这次捏合没有命中成员卡片。请先把右手靠近某张图片，再进行捏合。");
            return;
          }

          this.hideLaser();
          this.showLaserFromHandToMember(handEl, target);
          this.activeHand = hand;
          this.activeHandEl = handEl;
          this.playMemberAudio(target, "selected");
        },

        handlePinchMove(hand, pinchPosition) {
          if (!pinchPosition) {
            return;
          }

          this.handWorld[hand].copy(pinchPosition);

          if (this.activeSelection && this.activeHand === hand) {
            this.updateLaserFollow();
          }
        },

        handlePinchEnd(hand) {
          this.pinchingHands[hand] = false;
          const otherHandActive = this.pinchingHands.left || this.pinchingHands.right;
          if (otherHandActive) {
            return;
          }

          if (this.activeSelection) {
            this.fadeOutAudioAndClear();
          }
        },

        showLaserFromHandToMember(handEl, member) {
          if (!handEl || !member) {
            return;
          }

          handEl.object3D.getWorldPosition(this.tempWorld);
          this.tempWorld.y += 0.015;
          member.el.object3D.getWorldPosition(this.tempWorldB);
          this.tempWorldB.y += 0.06;

          this.laserEl.object3D.visible = true;
          this.laserEl.setAttribute(
            "line",
            `start: ${this.tempWorld.x} ${this.tempWorld.y} ${this.tempWorld.z}; end: ${this.tempWorldB.x} ${this.tempWorldB.y} ${this.tempWorldB.z}; color: ${member.color}; opacity: 0.88`
          );
        },

        hideLaser() {
          this.laserEl.object3D.visible = false;
        },

        updateLaserFollow() {
          if (!this.activeSelection || !this.laserEl.object3D.visible) {
            return;
          }

          if (this.activeHand && this.handWorld[this.activeHand]) {
            this.tempWorld.copy(this.handWorld[this.activeHand]);
          } else if (this.activeHandEl) {
            this.activeHandEl.object3D.getWorldPosition(this.tempWorld);
            this.tempWorld.y += 0.015;
          } else {
            return;
          }

          this.activeSelection.el.object3D.getWorldPosition(this.tempWorldB);
          this.tempWorldB.y += 0.06;

          this.laserEl.setAttribute(
            "line",
            `start: ${this.tempWorld.x} ${this.tempWorld.y} ${this.tempWorld.z}; end: ${this.tempWorldB.x} ${this.tempWorldB.y} ${this.tempWorldB.z}; color: ${this.activeSelection.color}; opacity: 0.88`
          );
        },

        updateAudioReactiveState() {
          if (this.audioEl.paused || this.audioEl.ended) {
            return;
          }

          const focus = this.activeSelection || this.previewTarget;
          if (!focus) {
            return;
          }

          const average = this.audioAnalyser ? this.audioAnalyser.getAverageFrequency() / 255 : 0;
          const energy = this.activeSelection
            ? 0.54 + average * 0.62
            : 0.18 + average * 0.22;

          document.querySelectorAll(".wand").forEach((el) => {
            const component = el.components["support-wand"];
            if (!component) {
              return;
            }
            component.setActiveColor(focus.color);
            component.setEnergy(energy);
          });
        },

        onAudioEnded() {
          if (this.activeSelection) {
            this.activeSelection = null;
            this.candidateTarget = null;
            this.candidateSince = 0;
            this.activeHand = null;
            this.activeHandEl = null;
            this.hideLaser();
            this.restoreVideo();
            this.restoreBgm();
            this.updateFocusHud(null, null);
            this.updateWandsForState();
            this.setStatus("当前成员音频已播放完毕。你可以继续靠近其他卡片，或再次捏合重新锁定。");
            return;
          }

          if (this.previewTarget) {
            this.previewTarget = null;
            this.restoreVideo();
            this.restoreBgm();
            this.updateFocusHud(this.candidateTarget, "preview");
            this.updateWandsForState();
          }
        },

        updateMemberVisuals(time, delta) {
          const now = performance.now();
          const stageElapsed = (now - this.stageStartedAt) / 1000;
          const dt = Math.max((delta || 16) / 1000, 0.0001);

          this.getCameraPose();
          this.handHasPose.left = this.getHandWorldPosition("left", this.handWorld.left);
          this.handHasPose.right = this.getHandWorldPosition("right", this.handWorld.right);
          for (const hand of ["left", "right"]) {
            if (this.handHasPose[hand]) {
              this.handSpeed[hand] = this.handWorld[hand].distanceTo(this.lastHandWorld[hand]) / dt;
              this.lastHandWorld[hand].copy(this.handWorld[hand]);
            } else {
              this.handSpeed[hand] = THREE.MathUtils.lerp(this.handSpeed[hand], 0, 0.25);
            }
          }
          this.hoveredByHand.left = null;
          this.hoveredByHand.right = null;

          let closestPreview = null;
          let closestPreviewDistance = Infinity;

          for (const member of this.members) {
            member.glowMesh = member.glowMesh || member.glowEl.getObject3D("mesh");
            member.panelMesh = member.panelMesh || member.panelEl.getObject3D("mesh");
            member.borderMesh = member.borderMesh || member.borderEl.getObject3D("mesh");
            member.badgeMesh = member.badgeMesh || member.badgeEl.getObject3D("mesh");

            member.el.object3D.getWorldPosition(this.tempWorld);

            let handDistance = Infinity;
            let handSource = null;
            for (const hand of ["left", "right"]) {
              if (!this.handHasPose[hand]) {
                continue;
              }

              const distance = this.handWorld[hand].distanceTo(this.tempWorld);
              if (distance < handDistance) {
                handDistance = distance;
                handSource = hand;
              }
            }

            const cameraDistance = this.cameraPosition.distanceTo(this.tempWorld);
            const hoverTarget = handDistance < APP_CONFIG.interaction.handHoverDistance
              ? 1 - handDistance / APP_CONFIG.interaction.handHoverDistance
              : 0;
            const nearTarget = cameraDistance < APP_CONFIG.interaction.focusDistance
              ? 1 - cameraDistance / APP_CONFIG.interaction.focusDistance
              : 0;
            const selectedTarget = this.activeSelection && this.activeSelection.key === member.key ? 1 : 0;

            member.hoverAmount = THREE.MathUtils.lerp(member.hoverAmount, Math.max(hoverTarget, nearTarget * 0.56), 0.18);
            member.selectedAmount = THREE.MathUtils.lerp(member.selectedAmount, selectedTarget, 0.16);

            if (hoverTarget > 0.1 && handSource) {
              this.hoveredByHand[handSource] = member.key;
            }

            const appear = THREE.MathUtils.clamp((stageElapsed - member.appearDelay) / 0.7, 0, 1);
            member.visibleAmount = appear;

            const forward = member.hoverAmount * 0.06 + member.selectedAmount * 0.1;
            member.forwardOffset = THREE.MathUtils.lerp(member.forwardOffset, forward, 0.18);
            member.el.object3D.scale.setScalar(0.76 + appear * 0.24 + member.selectedAmount * 0.06);
            member.el.object3D.position.x = member.baseX;
            member.el.object3D.position.y = member.baseY + (1 - appear) * 0.12 + Math.sin(time * 0.0012 + member.appearDelay * 4) * 0.012;
            member.el.object3D.position.z = member.baseZ + member.forwardOffset;

            const memberColor = new THREE.Color(member.color);
            const glowColor = new THREE.Color(APP_CONFIG.colors.accent).lerp(memberColor, Math.max(member.hoverAmount, member.selectedAmount));

            if (member.glowMesh) {
              member.glowMesh.material.color.copy(glowColor);
              member.glowMesh.material.opacity = (0.08 + member.hoverAmount * 0.2 + member.selectedAmount * 0.28) * appear;
            }

            if (member.panelMesh) {
              member.panelMesh.material.opacity = 0.7 + member.hoverAmount * 0.14 + member.selectedAmount * 0.1;
            }

            if (member.borderMesh) {
              member.borderMesh.material.color.copy(glowColor);
              member.borderMesh.material.opacity = (0.12 + member.hoverAmount * 0.26 + member.selectedAmount * 0.26) * appear;
              member.borderEl.object3D.scale.set(
                member.panelWidth / 0.62 + member.hoverAmount * 0.06 + member.selectedAmount * 0.08,
                member.panelHeight / 0.62 + member.hoverAmount * 0.08 + member.selectedAmount * 0.1,
                1
              );
            }

            member.nameEl.setAttribute("color", member.selectedAmount > 0.1 ? member.color : APP_CONFIG.colors.accentSoft);

            const isCandidate = this.candidateTarget && this.candidateTarget.key === member.key;
            const isSelected = this.activeSelection && this.activeSelection.key === member.key;
            const badgeOpacity = isSelected ? 0.92 : isCandidate ? 0.76 : 0;
            if (member.badgeMesh) {
              member.badgeMesh.material.color.set(isSelected ? member.color : APP_CONFIG.colors.accent);
              member.badgeMesh.material.opacity = badgeOpacity * appear;
            }
            member.badgeTextEl.setAttribute("value", isSelected ? "正在播放" : isCandidate ? "锁定目标" : "");
            member.badgeTextEl.setAttribute("visible", badgeOpacity > 0.01);

            if (!this.activeSelection && cameraDistance < APP_CONFIG.interaction.focusDistance && cameraDistance < closestPreviewDistance) {
              closestPreview = member;
              closestPreviewDistance = cameraDistance;
            }
          }

          if (!this.activeSelection) {
            if (closestPreview) {
              if (!this.candidateTarget || this.candidateTarget.key !== closestPreview.key) {
                this.candidateTarget = closestPreview;
                this.candidateSince = now;
                this.updateFocusHud(closestPreview, "preview");
                this.setStatus(`${closestPreview.name} 已瞄准。再靠近一点即可自动播放，或者直接用右手捏合锁定。`);
              } else if (
                now > this.previewCooldownUntil &&
                closestPreviewDistance < APP_CONFIG.interaction.autoSelectDistance &&
                now - this.candidateSince > APP_CONFIG.interaction.autoSelectHoldMs &&
                (!this.activeSelection || this.activeSelection.key !== closestPreview.key)
              ) {
                this.playMemberAudio(closestPreview, "selected");
                this.previewCooldownUntil = now + APP_CONFIG.interaction.replayCooldownMs;
              }
            } else {
              this.candidateTarget = null;
              this.candidateSince = 0;
              this.updateFocusHud(null, null);
            }

            if (
              this.previewTarget &&
              closestPreview !== this.previewTarget &&
              (!closestPreview || closestPreviewDistance > APP_CONFIG.interaction.releaseDistance)
            ) {
              this.stopMemberAudio(true);
              this.restoreVideo();
            }
          }
        },

        updateSelectionPresentation() {
          const target = this.activeSelection || this.candidateTarget;

          if (!target) {
            if (this.selectionBillboardEl) {
              this.selectionBillboardEl.object3D.visible = false;
            }
            if (this.selectionGroundCueEl) {
              this.selectionGroundCueEl.object3D.visible = false;
            }
            if (this.selectionBeamEl) {
              this.selectionBeamEl.object3D.visible = false;
            }
            return;
          }

          const x = target.baseX;
          const z = target.baseZ + target.forwardOffset;
          const isSelected = this.activeSelection && this.activeSelection.key === target.key;

          if (this.selectionBillboardEl) {
            this.selectionBillboardEl.object3D.visible = true;
            this.selectionBillboardEl.object3D.position.set(x, 1.62 + (isSelected ? 0.08 : 0), z + 0.22);
            this.selectionBillboardEl.object3D.rotation.set(0, 0, 0);
            this.selectionBillboardEl.object3D.scale.setScalar(isSelected ? 1.02 : 0.94);
          }

          if (this.selectionGroundCueEl) {
            this.selectionGroundCueEl.object3D.visible = true;
            this.selectionGroundCueEl.object3D.position.set(x, 0.03, z);
            this.selectionGroundCueEl.object3D.scale.setScalar(isSelected ? 1.18 : 1);
          }

          if (this.selectionGroundRingEl) {
            this.selectionGroundRingEl.setAttribute(
              "material",
              `shader: flat; color: ${target.color}; transparent: true; opacity: ${isSelected ? 0.5 : 0.28}; side: double`
            );
          }

          if (this.selectionBeamEl) {
            this.selectionBeamEl.object3D.visible = true;
            this.selectionBeamEl.object3D.position.set(x, 1.15, z);
            this.selectionBeamEl.object3D.scale.setScalar(isSelected ? 1.12 : 0.9);
          }

          if (this.selectionBeamConeEl) {
            this.selectionBeamConeEl.setAttribute(
              "material",
              `shader: flat; color: ${target.color}; transparent: true; opacity: ${isSelected ? 0.15 : 0.08}; side: double`
            );
          }
        },

        updatePerformanceParticles(now) {
          if (!this.activeSelection) {
            return;
          }

          const systems = this.el.systems["trail-pool"];
          if (!systems) {
            return;
          }

          let triggerHand = null;
          for (const hand of ["left", "right"]) {
            if (!this.handHasPose[hand] || this.handSpeed[hand] < 0.75) {
              continue;
            }

            this.activeSelection.el.object3D.getWorldPosition(this.tempWorld);
            if (this.handWorld[hand].distanceTo(this.tempWorld) < 0.75) {
              triggerHand = hand;
              break;
            }
          }

          if (!triggerHand || now - this.lastWaveBurstAt < 90) {
            return;
          }

          this.lastWaveBurstAt = now;
          this.activeSelection.el.object3D.getWorldPosition(this.tempWorld);
          this.tempWorld.y += 0.18 + Math.random() * 0.22;
          this.tempWorld.x += (Math.random() - 0.5) * 0.18;
          this.tempWorld.z += (Math.random() - 0.5) * 0.18;
          this.tempWorldB.set(
            (Math.random() - 0.5) * 0.08,
            0.08 + Math.random() * 0.12,
            (Math.random() - 0.5) * 0.08
          );
          systems.spawn(this.tempWorld, this.tempWorldB, 0.95, new THREE.Color(this.activeSelection.color));
        },

        updateScreenVisuals(delta) {
          const glowMesh = this.screenGlowEl.getObject3D("mesh");
          if (!glowMesh) {
            return;
          }

          const targetColor = this.activeSelection
            ? this.activeSelection.color
            : this.candidateTarget
              ? this.candidateTarget.color
            : APP_CONFIG.colors.accent;
          glowMesh.material.color.set(targetColor);
          const strength = this.activeSelection ? 0.22 : this.candidateTarget ? 0.14 : 0.08;
          glowMesh.material.opacity = THREE.MathUtils.lerp(glowMesh.material.opacity || 0.08, strength, 0.12);
          this.screenGlowEl.object3D.scale.setScalar(this.activeSelection ? 1.03 : this.candidateTarget ? 1.015 : 1);
        },

        demoNextMember() {
          if (!this.started) {
            this.startExperience();
            return;
          }

          const member = this.members[this.demoIndex % this.members.length];
          this.demoIndex += 1;
          this.playMemberAudio(member, "selected");
          this.hideLaser();
          this.setStatus(`桌面模式已切换到 ${member.name}。如果你在 Quest 3 中，请直接靠近卡片并用右手捏合测试。`);
        },

        resetExperience() {
          this.audioEl.pause();
          this.audioEl.currentTime = 0;
          if (this.bgmEl) {
            this.bgmEl.pause();
            this.bgmEl.currentTime = 0;
          }
          this.videoEl.pause();
          this.videoEl.currentTime = 0;
          this.restoreVideo();
          this.restoreBgm();
          this.activeSelection = null;
          this.previewTarget = null;
          this.candidateTarget = null;
          this.candidateSince = 0;
          this.activeHand = null;
          this.activeHandEl = null;
          this.pinchingHands.left = false;
          this.pinchingHands.right = false;
          this.hideLaser();
          this.updateFocusHud(null, null);
          this.updateWandsForState();
          this.positionStageInFront();

          if (this.started) {
            this.startVideoLoop();
            this.startBgmLoop();
          }

          this.setStatus("场景已重置。你可以重新靠近成员卡片测试空间音频，或再次用右手捏合锁定。");
        },

        onEnterXR() {
          document.body.classList.add("is-xr");
          if (this.started) {
            this.previewEnvironmentEl.object3D.visible = false;
            this.positionStageInFront();
          }
        },

        onExitXR() {
          document.body.classList.remove("is-xr");
          this.previewEnvironmentEl.object3D.visible = true;
          this.hideLaser();
        },

        tick(time, delta) {
          if (!this.started) {
            return;
          }

          this.updateMemberVisuals(time, delta);
          this.updateSelectionPresentation();
          this.updateScreenVisuals(delta);
          this.updateLaserFollow();
          this.updateAudioReactiveState();
          this.updatePerformanceParticles(performance.now());

          if (this.activeSelection) {
            this.duckVideo();
          } else if ((this.audioEl.paused || this.audioEl.ended) && !this.previewTarget) {
            this.restoreVideo();
          }
        },

        remove() {
          this.audioEl.removeEventListener("ended", this.onAudioEnded);
          this.audioEl.remove();
          if (this.bgmEl) {
            this.bgmEl.pause();
          }
          this.startButton.removeEventListener("click", this.startExperience);
          this.demoNextButton.removeEventListener("click", this.demoNextMember);
          this.resetButton.removeEventListener("click", this.resetExperience);
          this.el.removeEventListener("enter-vr", this.onEnterXR);
          this.el.removeEventListener("exit-vr", this.onExitXR);
        }
      });
    })();
  </script>
</body>
