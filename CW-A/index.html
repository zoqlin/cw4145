<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Meta Quest 3 校园草地 MR 应援体验</title>
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  <style>
    :root {
      --bg: rgba(8, 10, 18, 0.84);
      --panel: rgba(14, 18, 30, 0.92);
      --panel-soft: rgba(255, 255, 255, 0.06);
      --text: #f7fbff;
      --muted: rgba(247, 251, 255, 0.76);
      --accent: #ff4d9d;
      --accent-soft: #ffd6eb;
      --border: rgba(255, 255, 255, 0.12);
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(255, 77, 157, 0.28), transparent 32%),
        linear-gradient(180deg, #09111f 0%, #05070d 100%);
    }

    #overlay {
      position: fixed;
      inset: 0;
      padding: 20px;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      pointer-events: none;
      z-index: 10;
    }

    .panel {
      width: min(460px, calc(100vw - 24px));
      padding: 20px;
      border-radius: 26px;
      background:
        linear-gradient(155deg, rgba(255, 77, 157, 0.16), rgba(12, 17, 29, 0.96) 28%, rgba(7, 9, 16, 0.96)),
        var(--panel);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      pointer-events: auto;
      transition: transform 180ms ease, width 180ms ease, padding 180ms ease;
    }

    body.is-xr .panel {
      width: min(360px, calc(100vw - 20px));
      padding: 16px;
      transform: translateY(2px);
    }

    .eyebrow {
      margin: 0 0 10px;
      font-size: 11px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--accent-soft);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(26px, 4.2vw, 34px);
      line-height: 1.08;
    }

    #status {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 16px;
      padding: 12px 14px;
      font: inherit;
      color: var(--text);
      cursor: pointer;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.05)),
        rgba(255, 255, 255, 0.04);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      transition: transform 120ms ease, background 120ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.08)),
        rgba(255, 255, 255, 0.06);
    }

    #startButton {
      grid-column: 1 / -1;
      font-weight: 700;
      color: #190a18;
      background:
        linear-gradient(135deg, rgba(255, 77, 157, 0.96), rgba(255, 212, 232, 0.88));
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.28);
    }

    .tips {
      margin-bottom: 14px;
      padding: 14px;
      border-radius: 18px;
      background: var(--panel-soft);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .tips div + div {
      margin-top: 8px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    figure {
      margin: 0;
      padding: 10px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    figure img {
      display: block;
      width: 100%;
      margin-bottom: 8px;
      border-radius: 12px;
      object-fit: cover;
      aspect-ratio: 3 / 4;
    }

    figcaption {
      font-size: 12px;
      line-height: 1.45;
      color: var(--muted);
    }

    @media (max-width: 560px) {
      #overlay {
        padding: 14px;
      }

      .panel {
        width: calc(100vw - 18px);
        padding: 16px;
      }

      .controls,
      .cards {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="overlay">
    <div class="panel">
      <p class="eyebrow">A-Frame / WebXR / Meta Quest 3</p>
      <h1>校园草地 MR 偶像应援</h1>
      <p id="status">
        进入 Quest 3 的 MR 后，双手会自动出现虚拟应援棒；扫描专辑封面会弹出固定在真实空间中的
        <code>teaser-video.mp4</code>，扫描小卡会从卡片位置播放对应成员音频，并驱动应援棒节奏闪烁。
      </p>

      <div class="controls">
        <button id="startButton">进入 MR 场景</button>
        <button id="albumDemoButton">模拟专辑识别</button>
        <button id="photocardDemoButton">模拟小卡识别</button>
        <button id="resetButton">重置媒体锚点</button>
      </div>

      <div class="tips">
        <div>请在 Quest 3 的 Meta Browser 中通过 <code>https://</code> 或 <code>localhost</code> 打开本页。</div>
        <div>应援棒会跟随手部追踪移动，快速挥动时会留下短暂停留在真实空间中的粒子光轨。</div>
        <div>如果当前浏览器暂不支持图片追踪，也可以先用上面的模拟按钮检查视频窗口、空间音频和闪烁逻辑。</div>
      </div>

      <div class="cards">
        <figure>
          <img src="assets/album-cover.png" alt="专辑封面">
          <figcaption>专辑封面 -> <code>teaser-video.mp4</code></figcaption>
        </figure>
        <figure>
          <img src="assets/photocard-kun.png" alt="KUN 小卡">
          <figcaption>KUN 小卡 -> <code>voice-kun.mp3</code></figcaption>
        </figure>
        <figure>
          <img src="assets/photocard-ten.png" alt="TEN 小卡">
          <figcaption>TEN 小卡 -> <code>voice-ten.mp3</code></figcaption>
        </figure>
        <figure>
          <img src="assets/photocard-xj.png" alt="XJ 小卡">
          <figcaption>XJ 小卡 -> <code>xj.mp3</code></figcaption>
        </figure>
        <figure>
          <img src="assets/yangyang.png" alt="YANGYANG 小卡">
          <figcaption>YANGYANG 小卡 -> <code>yang.mp4</code></figcaption>
        </figure>
      </div>
    </div>
  </div>

  <a-scene
    id="scene"
    embedded
    background="color: #05070d"
    renderer="alpha: true; antialias: true; colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    xr-mode-ui="enabled: false"
    webxr="referenceSpaceType: local-floor; requiredFeatures: local-floor; optionalFeatures: hand-tracking, anchors, dom-overlay; overlayElement: #overlay"
    mr-idol-experience
  >
    <a-assets timeout="20000">
      <img id="albumTargetImage" src="assets/album-cover.png" crossorigin="anonymous">
      <img id="kunTargetImage" src="assets/photocard-kun.png" crossorigin="anonymous">
      <img id="tenTargetImage" src="assets/photocard-ten.png" crossorigin="anonymous">
      <img id="xjTargetImage" src="assets/photocard-xj.png" crossorigin="anonymous">
      <img id="yangyangTargetImage" src="assets/yangyang.png" crossorigin="anonymous">
      <img id="grassTexture" src="../AR/images/grass.jpg" crossorigin="anonymous">
      <video id="teaserVideo" src="assets/teaser-video.mp4" preload="auto" crossorigin="anonymous" playsinline webkit-playsinline></video>
    </a-assets>

    <a-entity id="previewEnvironment">
      <a-sky color="#10243c"></a-sky>
      <a-plane
        rotation="-90 0 0"
        width="28"
        height="28"
        material="src: #grassTexture; repeat: 10 10; roughness: 1; metalness: 0; side: double"
      ></a-plane>
      <a-ring
        position="0 0.02 0"
        rotation="-90 0 0"
        radius-inner="1"
        radius-outer="1.28"
        material="shader: flat; color: #ff4d9d; transparent: true; opacity: 0.18"
      ></a-ring>
      <a-text
        value="Desktop Preview Mode\nUse the demo buttons or switch to Quest 3."
        align="center"
        width="4.6"
        color="#ffd6eb"
        position="0 1.85 -2.2"
      ></a-text>
    </a-entity>

    <a-entity id="rig" position="0 0 2.8">
      <a-entity id="userCamera" camera="near: 0.01; far: 100" look-controls wasd-controls position="0 1.65 0"></a-entity>
    </a-entity>

    <a-entity id="leftHand" hand-tracking-controls="hand: left; modelStyle: dots; modelColor: #ffd6eb">
      <a-entity class="wand" support-wand="hand: left; cheerColor: #ff4d9d; flashColor: #ffffff">
        <a-cylinder
          class="wand-body"
          radius="0.014"
          height="0.26"
          position="0 0.13 0"
          material="color: #fff7fb; roughness: 0.22; metalness: 0.45; emissive: #ff4d9d; emissiveIntensity: 1.2"
        ></a-cylinder>
        <a-sphere
          class="wand-core"
          radius="0.042"
          position="0 0.29 0"
          material="color: #ffadd2; roughness: 0.14; metalness: 0.1; emissive: #ff4d9d; emissiveIntensity: 2.2"
        ></a-sphere>
        <a-sphere
          class="wand-halo"
          radius="0.08"
          position="0 0.29 0"
          material="shader: flat; color: #ff4d9d; transparent: true; opacity: 0.16; side: double"
        ></a-sphere>
        <a-entity
          class="wand-light"
          position="0 0.29 0"
          light="type: point; color: #ff4d9d; intensity: 1.2; distance: 0.9; decay: 1.6"
        ></a-entity>
      </a-entity>
    </a-entity>

    <a-entity id="rightHand" hand-tracking-controls="hand: right; modelStyle: dots; modelColor: #ffd6eb">
      <a-entity class="wand" support-wand="hand: right; cheerColor: #ff4d9d; flashColor: #ffffff">
        <a-cylinder
          class="wand-body"
          radius="0.014"
          height="0.26"
          position="0 0.13 0"
          material="color: #fff7fb; roughness: 0.22; metalness: 0.45; emissive: #ff4d9d; emissiveIntensity: 1.2"
        ></a-cylinder>
        <a-sphere
          class="wand-core"
          radius="0.042"
          position="0 0.29 0"
          material="color: #ffadd2; roughness: 0.14; metalness: 0.1; emissive: #ff4d9d; emissiveIntensity: 2.2"
        ></a-sphere>
        <a-sphere
          class="wand-halo"
          radius="0.08"
          position="0 0.29 0"
          material="shader: flat; color: #ff4d9d; transparent: true; opacity: 0.16; side: double"
        ></a-sphere>
        <a-entity
          class="wand-light"
          position="0 0.29 0"
          light="type: point; color: #ff4d9d; intensity: 1.2; distance: 0.9; decay: 1.6"
        ></a-entity>
      </a-entity>
    </a-entity>

    <a-entity id="videoWindow" album-window visible="false">
      <a-plane
        width="1.06"
        height="0.68"
        position="0 0 -0.01"
        material="shader: flat; color: #ff4d9d; transparent: true; opacity: 0.14; side: double"
      ></a-plane>
      <a-plane
        width="0.98"
        height="0.6"
        material="shader: flat; color: #16091f; transparent: true; opacity: 0.92; side: double"
      ></a-plane>
      <a-plane
        class="video-screen"
        width="0.9"
        height="0.506"
        position="0 0.02 0.01"
        material="shader: flat; src: #teaserVideo; side: double"
      ></a-plane>
      <a-text
        value="Album teaser locked in space"
        align="center"
        width="2"
        color="#ffd6eb"
        position="0 -0.33 0.02"
      ></a-text>
      <a-text
        value="Walk around to watch the floating MV window."
        align="center"
        width="1.9"
        color="#ffffff"
        position="0 -0.4 0.02"
      ></a-text>
    </a-entity>

    <a-entity id="voiceAnchor" spatial-voice="wandSelector: .wand" visible="false">
      <a-sphere
        class="voice-core"
        radius="0.034"
        material="shader: flat; color: #ff4d9d; transparent: true; opacity: 0.86"
      ></a-sphere>
      <a-sphere
        class="voice-ring"
        radius="0.08"
        material="shader: flat; color: #ffffff; transparent: true; opacity: 0.16; side: double"
      ></a-sphere>
      <a-text
        class="voice-label"
        value="Voice anchor"
        align="center"
        width="1.3"
        color="#ffd6eb"
        position="0 0.12 0"
      ></a-text>
    </a-entity>

    <a-light type="ambient" intensity="0.72" color="#ffffff"></a-light>
    <a-light type="directional" intensity="0.9" color="#ffeaf4" position="1.5 3 1.5"></a-light>
  </a-scene>

  <script>
    (() => {
      const APP_CONFIG = {
        cheerColor: "#ff4d9d",
        flashColor: "#ffffff",
        album: {
          key: "album",
          kind: "album",
          label: "专辑封面",
          widthInMeters: 0.15,
          assetId: "albumTargetImage"
        },
        photocards: [
          {
            key: "kun",
            kind: "photocard",
            label: "KUN 小卡",
            member: "KUN",
            widthInMeters: 0.055,
            assetId: "kunTargetImage",
            audioSrc: "assets/voice-kun.mp3"
          },
          {
            key: "ten",
            kind: "photocard",
            label: "TEN 小卡",
            member: "TEN",
            widthInMeters: 0.055,
            assetId: "tenTargetImage",
            audioSrc: "assets/voice-ten.mp3"
          },
          {
            key: "xj",
            kind: "photocard",
            label: "XJ 小卡",
            member: "XJ",
            widthInMeters: 0.055,
            assetId: "xjTargetImage",
            audioSrc: "assets/xj.mp3"
          },
          {
            key: "yangyang",
            kind: "photocard",
            label: "YANGYANG 小卡",
            member: "YANGYANG",
            widthInMeters: 0.055,
            assetId: "yangyangTargetImage",
            audioSrc: "assets/yang.mp4"
          }
        ]
      };

      APP_CONFIG.targets = [APP_CONFIG.album].concat(APP_CONFIG.photocards);

      AFRAME.registerSystem("trail-pool", {
        init() {
          this.cursor = 0;
          this.items = [];
          const geometry = new THREE.IcosahedronGeometry(1, 0);

          for (let i = 0; i < 96; i += 1) {
            const material = new THREE.MeshBasicMaterial({
              color: APP_CONFIG.cheerColor,
              transparent: true,
              opacity: 0,
              blending: THREE.AdditiveBlending,
              depthWrite: false
            });

            const mesh = new THREE.Mesh(geometry, material);
            mesh.visible = false;
            mesh.renderOrder = 10;
            this.el.object3D.add(mesh);

            this.items.push({
              mesh,
              material,
              velocity: new THREE.Vector3(),
              life: 0,
              maxLife: 0,
              baseScale: 0.02
            });
          }
        },

        spawn(position, motion, intensity, color) {
          const count = intensity > 0.82 ? 3 : intensity > 0.46 ? 2 : 1;

          for (let i = 0; i < count; i += 1) {
            const item = this.items[this.cursor % this.items.length];
            this.cursor += 1;

            const spread = 0.012 + intensity * 0.03;
            item.mesh.visible = true;
            item.mesh.position.copy(position);
            item.mesh.position.x += (Math.random() - 0.5) * spread;
            item.mesh.position.y += (Math.random() - 0.5) * spread;
            item.mesh.position.z += (Math.random() - 0.5) * spread;

            item.baseScale = 0.018 + intensity * 0.045 + Math.random() * 0.01;
            item.mesh.scale.setScalar(item.baseScale);
            item.material.color.copy(color);
            item.material.opacity = 0.58;

            item.velocity.copy(motion).multiplyScalar(-0.12);
            item.velocity.x += (Math.random() - 0.5) * 0.18;
            item.velocity.y += Math.random() * 0.16;
            item.velocity.z += (Math.random() - 0.5) * 0.18;

            item.life = 0.25 + intensity * 0.55 + Math.random() * 0.08;
            item.maxLife = item.life;
          }
        },

        tick(time, delta) {
          if (!delta) {
            return;
          }

          const dt = delta / 1000;
          for (const item of this.items) {
            if (!item.mesh.visible) {
              continue;
            }

            item.life -= dt;
            if (item.life <= 0) {
              item.mesh.visible = false;
              continue;
            }

            const life01 = item.life / item.maxLife;
            item.mesh.position.addScaledVector(item.velocity, dt);
            item.velocity.multiplyScalar(0.96);
            item.mesh.scale.setScalar(item.baseScale + (1 - life01) * 0.06);
            item.material.opacity = Math.pow(life01, 1.8) * 0.6;
          }
        }
      });

      AFRAME.registerComponent("support-wand", {
        schema: {
          hand: { default: "right" },
          cheerColor: { type: "color", default: APP_CONFIG.cheerColor },
          flashColor: { type: "color", default: APP_CONFIG.flashColor }
        },

        init() {
          const isLeft = this.data.hand === "left";

          this.el.object3D.position.set(isLeft ? -0.03 : 0.03, -0.035, -0.06);
          this.el.object3D.rotation.set(
            THREE.MathUtils.degToRad(74),
            0,
            THREE.MathUtils.degToRad(isLeft ? -18 : 18)
          );

          this.bodyEl = this.el.querySelector(".wand-body");
          this.coreEl = this.el.querySelector(".wand-core");
          this.haloEl = this.el.querySelector(".wand-halo");
          this.lightEl = this.el.querySelector(".wand-light");

          this.bodyMesh = null;
          this.coreMesh = null;
          this.haloMesh = null;

          this.baseColor = new THREE.Color(this.data.cheerColor);
          this.flashColor = new THREE.Color(this.data.flashColor);
          this.mixColor = new THREE.Color(this.data.cheerColor);
          this.coreTint = new THREE.Color(this.data.cheerColor);

          this.tipWorld = new THREE.Vector3();
          this.lastTipWorld = new THREE.Vector3();
          this.motion = new THREE.Vector3();

          this.ready = false;
          this.speed = 0;
          this.rhythmTarget = 0;
          this.rhythmValue = 0;
          this.trailAccumulator = 0;
        },

        setRhythmIntensity(value) {
          this.rhythmTarget = THREE.MathUtils.clamp(value, 0, 1);
        },

        updateMeshes() {
          if (!this.bodyMesh && this.bodyEl) {
            this.bodyMesh = this.bodyEl.getObject3D("mesh");
          }

          if (!this.coreMesh && this.coreEl) {
            this.coreMesh = this.coreEl.getObject3D("mesh");
          }

          if (!this.haloMesh && this.haloEl) {
            this.haloMesh = this.haloEl.getObject3D("mesh");
          }
        },

        tick(time, delta) {
          const inAR = this.el.sceneEl.is("ar-mode");
          this.el.object3D.visible = inAR;

          if (!inAR) {
            this.ready = false;
            this.speed = 0;
            this.rhythmTarget = 0;
            this.rhythmValue = 0;
            return;
          }

          this.updateMeshes();
          if (!delta || !this.coreEl) {
            return;
          }

          this.coreEl.object3D.getWorldPosition(this.tipWorld);

          if (!this.ready) {
            this.lastTipWorld.copy(this.tipWorld);
            this.ready = true;
            return;
          }

          const dt = delta / 1000;
          this.motion.subVectors(this.tipWorld, this.lastTipWorld);
          const instantSpeed = this.motion.length() / Math.max(dt, 0.0001);
          this.speed = THREE.MathUtils.lerp(this.speed, instantSpeed, 0.2);
          this.lastTipWorld.copy(this.tipWorld);

          this.rhythmValue = THREE.MathUtils.lerp(this.rhythmValue, this.rhythmTarget, 0.2);
          this.rhythmTarget *= 0.985;

          const motion01 = THREE.MathUtils.clamp(this.speed / 2.1, 0, 1);
          const combined = Math.min(1, Math.max(motion01, this.rhythmValue * 0.95));
          const flashMix = Math.min(1, motion01 * 0.25 + this.rhythmValue * 0.85);

          this.mixColor.copy(this.baseColor).lerp(this.flashColor, flashMix);
          this.coreTint.copy(this.mixColor).lerp(new THREE.Color("#ffffff"), 0.18);

          if (this.bodyMesh && this.bodyMesh.material.emissive) {
            this.bodyMesh.material.color.set("#fff7fb");
            this.bodyMesh.material.emissive.copy(this.mixColor);
            this.bodyMesh.material.emissiveIntensity = 0.9 + motion01 * 2.2 + this.rhythmValue * 2.4;
          }

          if (this.coreMesh && this.coreMesh.material.emissive) {
            this.coreMesh.material.color.copy(this.coreTint);
            this.coreMesh.material.emissive.copy(this.mixColor);
            this.coreMesh.material.emissiveIntensity = 1.8 + motion01 * 4.6 + this.rhythmValue * 5.4;
          }

          if (this.haloMesh) {
            this.haloMesh.material.color.copy(this.mixColor);
            this.haloMesh.material.opacity = 0.08 + combined * 0.26;
            this.haloEl.object3D.scale.setScalar(1 + combined * 1.4 + Math.sin(time * 0.018) * 0.08);
          }

          const light = this.lightEl ? this.lightEl.getObject3D("light") : null;
          if (light) {
            light.color.copy(this.mixColor);
            light.intensity = 0.6 + combined * 4.2;
            light.distance = 0.7 + motion01 * 1.1;
          }

          this.trailAccumulator += delta;
          const spawnInterval = combined > 0.7 ? 18 : 34;
          if (combined > 0.08 && this.trailAccumulator >= spawnInterval) {
            this.el.sceneEl.systems["trail-pool"].spawn(this.tipWorld, this.motion, combined, this.mixColor);
            this.trailAccumulator = 0;
          }
        }
      });

      AFRAME.registerComponent("album-window", {
        init() {
          this.videoEl = document.getElementById("teaserVideo");
          this.active = false;
          this.cameraPosition = new THREE.Vector3();
          this.offset = new THREE.Vector3();
          this.lift = new THREE.Vector3(0, 0.14, 0);

          this.onEnded = () => {
            this.active = false;
          };

          this.videoEl.addEventListener("ended", this.onEnded);
        },

        getCameraPosition(target) {
          const cameraEl = document.getElementById("userCamera");
          if (cameraEl) {
            cameraEl.object3D.getWorldPosition(target);
            return target;
          }

          target.set(0, 1.6, 0);
          return target;
        },

        showAt(targetPosition) {
          this.getCameraPosition(this.cameraPosition);

          this.offset.subVectors(this.cameraPosition, targetPosition);
          this.offset.y = 0;
          if (this.offset.lengthSq() < 0.0001) {
            this.offset.set(0, 0, 1);
          }

          this.offset.normalize().multiplyScalar(0.24);
          this.el.object3D.position.copy(targetPosition).add(this.offset).add(this.lift);
          this.el.object3D.lookAt(
            this.cameraPosition.x,
            this.el.object3D.position.y + 0.02,
            this.cameraPosition.z
          );
          this.el.object3D.visible = true;
          this.active = true;

          this.videoEl.currentTime = 0;
          const playPromise = this.videoEl.play();
          if (playPromise && playPromise.catch) {
            playPromise.catch(() => {});
          }
        },

        reset() {
          this.videoEl.pause();
          this.videoEl.currentTime = 0;
          this.active = false;
          this.el.object3D.visible = false;
        },

        remove() {
          this.videoEl.removeEventListener("ended", this.onEnded);
        }
      });

      AFRAME.registerComponent("spatial-voice", {
        schema: {
          wandSelector: { default: ".wand" }
        },

        init() {
          this.currentTarget = null;
          this.pulse = 0;
          this.pendingPosition = new THREE.Vector3();
          this.wandComponents = [];

          this.coreEl = this.el.querySelector(".voice-core");
          this.ringEl = this.el.querySelector(".voice-ring");
          this.labelEl = this.el.querySelector(".voice-label");
          this.coreMesh = null;
          this.ringMesh = null;

          this.attachListener = this.attachListener.bind(this);
          this.refreshWands = this.refreshWands.bind(this);
          this.onEnded = this.onEnded.bind(this);

          this.refreshWands();
          window.setTimeout(this.refreshWands, 1000);

          const sceneEl = this.el.sceneEl;
          const listener = sceneEl.audioListener || new THREE.AudioListener();
          sceneEl.audioListener = listener;

          if (sceneEl.camera && listener.parent !== sceneEl.camera) {
            sceneEl.camera.add(listener);
          } else {
            sceneEl.addEventListener("camera-set-active", this.attachListener);
          }

          this.sound = new THREE.PositionalAudio(listener);
          this.sound.setRefDistance(0.35);
          this.sound.setRolloffFactor(1.5);
          this.sound.setMaxDistance(4.5);
          this.sound.setDistanceModel("exponential");
          this.sound.setVolume(1);

          this.mediaEl = document.createElement("audio");
          this.mediaEl.preload = "auto";
          this.mediaEl.crossOrigin = "anonymous";
          this.mediaEl.setAttribute("playsinline", "playsinline");
          this.mediaEl.style.display = "none";
          this.mediaEl.addEventListener("ended", this.onEnded);
          document.body.appendChild(this.mediaEl);

          this.sound.setMediaElementSource(this.mediaEl);
          this.analyser = new THREE.AudioAnalyser(this.sound, 32);
          this.el.object3D.add(this.sound);
        },

        attachListener(event) {
          const camera = event && event.detail
            ? event.detail.cameraEl.getObject3D("camera")
            : this.el.sceneEl.camera;

          if (camera && this.el.sceneEl.audioListener.parent !== camera) {
            camera.add(this.el.sceneEl.audioListener);
          }
        },

        refreshWands() {
          this.wandComponents = Array.from(document.querySelectorAll(this.data.wandSelector))
            .map((el) => el.components["support-wand"])
            .filter(Boolean);
        },

        updateMeshes() {
          if (!this.coreMesh && this.coreEl) {
            this.coreMesh = this.coreEl.getObject3D("mesh");
          }

          if (!this.ringMesh && this.ringEl) {
            this.ringMesh = this.ringEl.getObject3D("mesh");
          }
        },

        updateWands(value) {
          for (const component of this.wandComponents) {
            component.setRhythmIntensity(value);
          }
        },

        isPlaying() {
          return !!(this.mediaEl && !this.mediaEl.paused && !this.mediaEl.ended);
        },

        playTarget(target, position) {
          if (!target) {
            return;
          }

          this.currentTarget = target;
          this.pendingPosition.copy(position).add(new THREE.Vector3(0, 0.08, 0));
          this.el.object3D.position.copy(this.pendingPosition);
          this.el.object3D.visible = true;

          if (this.labelEl) {
            this.labelEl.setAttribute("value", `${target.member} voice`);
          }

          this.mediaEl.pause();
          this.mediaEl.currentTime = 0;

          if (this.mediaEl.getAttribute("src") !== target.audioSrc) {
            this.mediaEl.setAttribute("src", target.audioSrc);
            this.mediaEl.load();
          }

          if (this.sound.context && this.sound.context.resume) {
            this.sound.context.resume().catch(() => {});
          }

          const playPromise = this.mediaEl.play();
          if (playPromise && playPromise.catch) {
            playPromise.catch(() => {});
          }

          this.updateWands(0.22);
        },

        onEnded() {
          this.currentTarget = null;
          this.pulse = 0;
          this.updateWands(0);
          this.el.object3D.visible = false;
        },

        stop() {
          if (this.mediaEl) {
            this.mediaEl.pause();
            this.mediaEl.currentTime = 0;
          }

          this.currentTarget = null;
          this.pulse = 0;
          this.updateWands(0);
          this.el.object3D.visible = false;
        },

        tick(time, delta) {
          if (!delta) {
            return;
          }

          this.updateMeshes();

          let intensity = 0;
          if (this.isPlaying() && this.analyser) {
            intensity = THREE.MathUtils.clamp(this.analyser.getAverageFrequency() / 150, 0, 1);
          }

          this.pulse = THREE.MathUtils.lerp(this.pulse, intensity, 0.28);
          this.updateWands(this.pulse);

          if (this.coreMesh) {
            this.coreMesh.material.opacity = 0.28 + this.pulse * 0.62;
            this.coreEl.object3D.scale.setScalar(1 + this.pulse * 0.45);
          }

          if (this.ringMesh) {
            this.ringMesh.material.opacity = 0.08 + this.pulse * 0.24;
            this.ringEl.object3D.scale.setScalar(1 + this.pulse * 1.4);
          }

          if (!this.isPlaying() && this.pulse < 0.03) {
            this.updateWands(0);
          }
        },

        remove() {
          this.el.sceneEl.removeEventListener("camera-set-active", this.attachListener);
          if (this.mediaEl) {
            this.mediaEl.removeEventListener("ended", this.onEnded);
            this.mediaEl.remove();
          }
          this.stop();
        }
      });

      AFRAME.registerComponent("mr-idol-experience", {
        init() {
          this.statusEl = document.getElementById("status");
          this.previewEnvironmentEl = document.getElementById("previewEnvironment");
          this.startButton = document.getElementById("startButton");
          this.albumDemoButton = document.getElementById("albumDemoButton");
          this.photocardDemoButton = document.getElementById("photocardDemoButton");
          this.resetButton = document.getElementById("resetButton");
          this.videoWindowEl = document.getElementById("videoWindow");
          this.voiceAnchorEl = document.getElementById("voiceAnchor");
          this.videoEl = document.getElementById("teaserVideo");

          this.targets = APP_CONFIG.targets;
          this.photocardTargets = APP_CONFIG.photocards;
          this.trackedImages = null;
          this.imageTrackingEnabled = false;
          this.preparing = false;
          this.warnedMissingTracking = false;
          this.lastAlbumTrigger = 0;
          this.lastPhotocardTrigger = 0;
          this.photocardDemoIndex = 0;

          this.cameraPosition = new THREE.Vector3();
          this.cameraDirection = new THREE.Vector3();
          this.targetPosition = new THREE.Vector3();

          this.startExperience = this.startExperience.bind(this);
          this.simulateAlbum = this.simulateAlbum.bind(this);
          this.simulatePhotocard = this.simulatePhotocard.bind(this);
          this.resetAnchors = this.resetAnchors.bind(this);
          this.onEnterXR = this.onEnterXR.bind(this);
          this.onExitXR = this.onExitXR.bind(this);

          this.startButton.addEventListener("click", this.startExperience);
          this.albumDemoButton.addEventListener("click", this.simulateAlbum);
          this.photocardDemoButton.addEventListener("click", this.simulatePhotocard);
          this.resetButton.addEventListener("click", this.resetAnchors);
          this.el.addEventListener("enter-vr", this.onEnterXR);
          this.el.addEventListener("exit-vr", this.onExitXR);
        },

        setStatus(text) {
          this.statusEl.textContent = text;
        },

        async primeVideo() {
          this.videoEl.muted = true;
          try {
            await this.videoEl.play();
          } catch (error) {
          }
          this.videoEl.pause();
          this.videoEl.currentTime = 0;
          this.videoEl.muted = false;
        },

        async prepareTrackedImages() {
          if (this.trackedImages) {
            return this.trackedImages;
          }

          this.trackedImages = await Promise.all(
            this.targets.map(async (target) => {
              const imgEl = document.getElementById(target.assetId);
              if (imgEl.decode) {
                await imgEl.decode().catch(() => {});
              }

              let imageSource = imgEl;
              if (window.createImageBitmap) {
                try {
                  imageSource = await createImageBitmap(imgEl);
                } catch (error) {
                  imageSource = imgEl;
                }
              }

              return {
                image: imageSource,
                widthInMeters: target.widthInMeters
              };
            })
          );

          return this.trackedImages;
        },

        configureWebXR(enableTracking, trackedImages) {
          const optionalFeatures = enableTracking
            ? "hand-tracking, anchors, dom-overlay, image-tracking"
            : "hand-tracking, anchors, dom-overlay";

          this.el.setAttribute(
            "webxr",
            `referenceSpaceType: local-floor; requiredFeatures: local-floor; optionalFeatures: ${optionalFeatures}; overlayElement: #overlay`
          );

          const webxrSystem = this.el.systems.webxr;
          if (!webxrSystem || !webxrSystem.sessionConfiguration) {
            return;
          }

          if (enableTracking && trackedImages) {
            webxrSystem.sessionConfiguration.trackedImages = trackedImages;
          } else {
            delete webxrSystem.sessionConfiguration.trackedImages;
          }
        },

        async startExperience() {
          if (this.preparing) {
            return;
          }

          this.preparing = true;

          try {
            await this.primeVideo();

            if (!window.isSecureContext) {
              this.setStatus("WebXR 的 immersive-ar 需要 HTTPS 或 localhost。请把页面放到安全上下文后，再在 Quest 3 的 Meta Browser 中打开。");
              return;
            }

            if (!navigator.xr) {
              this.setStatus("当前浏览器没有提供 WebXR。你可以先用模拟按钮检查视频窗口和空间音频映射。");
              return;
            }

            const supported = await navigator.xr.isSessionSupported("immersive-ar");
            if (!supported) {
              this.setStatus("当前环境不支持 immersive-ar。请改用 Quest 3 的 Meta Browser 重新打开本页。");
              return;
            }

            this.setStatus("正在准备图片追踪与手部追踪资源...");
            const trackedImages = await this.prepareTrackedImages();

            this.configureWebXR(true, trackedImages);
            this.warnedMissingTracking = false;

            try {
              this.setStatus("正在请求 Quest 3 的透视 MR 会话...");
              await this.el.enterAR();
              this.imageTrackingEnabled = true;
              this.setStatus("已进入 MR。扫描专辑封面播放 teaser 视频，扫描小卡播放对应成员语音。");
              return;
            } catch (primaryError) {
              console.warn("Image tracking session request failed.", primaryError);
              this.imageTrackingEnabled = false;
            }

            this.configureWebXR(false, null);

            try {
              this.setStatus("当前环境暂不支持图片追踪，已退回无追踪 MR 预览。你仍可使用模拟按钮验证交互逻辑。");
              await this.el.enterAR();
            } catch (secondaryError) {
              console.warn("Fallback AR request failed.", secondaryError);
              this.setStatus("当前设备或浏览器无法进入 immersive-ar。请改用 Quest 3 的 Meta Browser，并通过 HTTPS 或 localhost 打开。");
            }
          } finally {
            this.preparing = false;
          }
        },

        getCameraPose() {
          const cameraEl = document.getElementById("userCamera");
          cameraEl.object3D.getWorldPosition(this.cameraPosition);
          cameraEl.object3D.getWorldDirection(this.cameraDirection);
          return {
            position: this.cameraPosition,
            direction: this.cameraDirection
          };
        },

        showAlbumAt(position) {
          const albumWindow = this.videoWindowEl.components["album-window"];
          if (!albumWindow) {
            return;
          }

          albumWindow.showAt(position);
          this.lastAlbumTrigger = performance.now();
          this.setStatus("已识别专辑封面，teaser 视频窗口已固定在真实空间中，你可以绕着窗口自由移动观看。");
        },

        playPhotocardAt(position, target) {
          const voiceAnchor = this.voiceAnchorEl.components["spatial-voice"];
          if (!voiceAnchor || !target) {
            return;
          }

          voiceAnchor.playTarget(target, position);
          this.lastPhotocardTrigger = performance.now();
          this.setStatus(`已识别 ${target.label}，正在从卡片位置播放 ${target.audioSrc.split("/").pop()}，并驱动应援棒随节奏闪烁。`);
        },

        simulateAlbum() {
          const pose = this.getCameraPose();
          this.targetPosition
            .copy(pose.position)
            .add(pose.direction.clone().multiplyScalar(1.15))
            .add(new THREE.Vector3(0, -0.08, 0));
          this.showAlbumAt(this.targetPosition);
        },

        simulatePhotocard() {
          if (!this.photocardTargets.length) {
            return;
          }

          const target = this.photocardTargets[this.photocardDemoIndex % this.photocardTargets.length];
          this.photocardDemoIndex += 1;

          const pose = this.getCameraPose();
          this.targetPosition
            .copy(pose.position)
            .add(pose.direction.clone().multiplyScalar(0.95))
            .add(new THREE.Vector3(0, -0.22, 0));
          this.playPhotocardAt(this.targetPosition, target);
        },

        resetAnchors() {
          const albumWindow = this.videoWindowEl.components["album-window"];
          const voiceAnchor = this.voiceAnchorEl.components["spatial-voice"];

          if (albumWindow) {
            albumWindow.reset();
          }

          if (voiceAnchor) {
            voiceAnchor.stop();
          }

          this.setStatus("媒体锚点已重置。重新扫描专辑封面或小卡即可再次触发。");
        },

        onEnterXR() {
          if (this.el.is("ar-mode")) {
            document.body.classList.add("is-xr");
            this.previewEnvironmentEl.object3D.visible = false;
          }
        },

        onExitXR() {
          document.body.classList.remove("is-xr");
          this.previewEnvironmentEl.object3D.visible = true;
          this.imageTrackingEnabled = false;
        },

        tick() {
          if (!this.el.is("ar-mode") || !this.imageTrackingEnabled) {
            return;
          }

          const renderer = this.el.renderer;
          if (!renderer || !renderer.xr) {
            return;
          }

          const frame = renderer.xr.getFrame && renderer.xr.getFrame();
          const referenceSpace = renderer.xr.getReferenceSpace && renderer.xr.getReferenceSpace();

          if (!frame || !referenceSpace) {
            return;
          }

          if (typeof frame.getImageTrackingResults !== "function") {
            if (!this.warnedMissingTracking) {
              this.warnedMissingTracking = true;
              this.setStatus("当前 XR 会话没有返回图片追踪结果。你仍可测试手部应援棒，或先用模拟按钮演示媒体交互。");
            }
            return;
          }

          const results = frame.getImageTrackingResults();
          if (!results.length) {
            return;
          }

          const now = performance.now();
          const albumWindow = this.videoWindowEl.components["album-window"];
          const voiceAnchor = this.voiceAnchorEl.components["spatial-voice"];

          for (const result of results) {
            const target = this.targets[result.index];
            if (!target) {
              continue;
            }

            const pose = frame.getPose(result.imageSpace, referenceSpace);
            if (!pose) {
              continue;
            }

            this.targetPosition.set(
              pose.transform.position.x,
              pose.transform.position.y,
              pose.transform.position.z
            );

            const tracked = result.trackingState === "tracked" || result.trackingState === "emulated";
            if (!tracked) {
              continue;
            }

            if (target.kind === "album") {
              const busy = albumWindow && albumWindow.active;
              if (!busy && now - this.lastAlbumTrigger > 2600) {
                this.showAlbumAt(this.targetPosition);
              }
            }

            if (target.kind === "photocard") {
              const busy = voiceAnchor && voiceAnchor.isPlaying();
              if (!busy && now - this.lastPhotocardTrigger > 1600) {
                this.playPhotocardAt(this.targetPosition, target);
              }
            }
          }
        },

        remove() {
          this.startButton.removeEventListener("click", this.startExperience);
          this.albumDemoButton.removeEventListener("click", this.simulateAlbum);
          this.photocardDemoButton.removeEventListener("click", this.simulatePhotocard);
          this.resetButton.removeEventListener("click", this.resetAnchors);
          this.el.removeEventListener("enter-vr", this.onEnterXR);
          this.el.removeEventListener("exit-vr", this.onExitXR);
        }
      });
    })();
  </script>
</body>
